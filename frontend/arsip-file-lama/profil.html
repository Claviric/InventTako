<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil & Analitik | InvenTako</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="profil.css">
</head>
<body class="bg-white min-h-screen flex flex-col text-slate-800">

    <header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-white shadow-sm">
        <div class="text-3xl font-extrabold text-[#0044ff] tracking-tight">InvenTako</div>
        <div class="flex items-center gap-2 text-[#0044ff] cursor-pointer hover:text-blue-800 transition-colors" onclick="confirmLogout()" title="Logout">
            <i data-lucide="log-out" class="w-6 h-6"></i>
            <span class="text-base font-semibold uppercase">Logout</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden pt-20">
        
        <aside class="fixed top-20 left-0 bottom-0 w-56 border-r border-slate-200 py-6 flex flex-col gap-1 bg-white z-40">
            <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="barang.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="book-marked" class="w-5 h-5"></i>
                <span class="font-medium">Barang</span>
            </a>
            <a href="transaksi.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="banknote" class="w-5 h-5"></i>
                <span class="font-medium">Kasir / Transaksi</span>
            </a>
            <a href="riwayat-transaksi.html" class="flex items-center gap-3 px-6 py-3 text-black hover:bg-slate-50 transition-colors">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="font-medium">Riwayat Transaksi</span>
            </a>
            <a href="profil.html" class="flex items-center gap-3 px-6 py-3 bg-[#0044ff] text-white">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="font-medium">Profil</span>
            </a>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto bg-white ml-56">
            
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-black">Profil dan Analitik Toko</h1>
            </div>

            <!-- Kartu Identitas -->
            <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 max-w-2xl mb-10">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-blue-50 border border-blue-200 rounded-full flex items-center justify-center text-[#0044ff]">
                        <i data-lucide="user" class="w-10 h-10" stroke-width="1.5"></i>
                    </div>
                    <div class="flex-1">
                        <h2 id="profileName" class="text-xl font-bold text-black uppercase">Admin</h2>
                        <p class="text-sm text-slate-500 mt-0.5 flex items-center gap-1.5">
                            <i data-lucide="shield-check" class="w-4 h-4 text-green-600"></i> Pemilik Toko
                        </p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                
                <!--Graf Pertumbuhan Pendapatan (Line Chart)-->
                <div class="bg-white p-6 border border-slate-200 rounded-lg shadow-sm lg:col-span-2">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
                        <h3 class="text-sm font-bold text-slate-600 uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="trending-up" class="w-4 h-4 text-[#0044ff]"></i> Pertumbuhan Pendapatan
                        </h3>
                        <div class="flex items-center gap-2">
                            <label for="weekFilter" class="text-xs font-semibold text-slate-500 uppercase">Filter:</label>
                            <select id="weekFilter" onchange="updateLineChart()" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white text-slate-700 font-medium shadow-sm hover:border-[#0044ff] focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                <option value="current">Minggu Ini</option>
                                <option value="last">Minggu Lalu</option>
                                <option value="all">Semua Waktu</option>
                            </select>
                        </div>
                    </div>
                    <div class="relative h-72 w-full">
                        <canvas id="allTimeLineChart"></canvas>
                    </div>
                </div>

                <!-- Bar Chart Top 5 Barang Terlaku-->
                <div class="bg-white p-6 border border-slate-200 rounded-lg shadow-sm">
                    <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="award" class="w-4 h-4 text-yellow-500"></i> 5 Barang Terlaris (Qty)
                    </h3>
                    <div class="relative h-64 w-full">
                        <canvas id="topItemsBarChart"></canvas>
                    </div>
                </div>

                <!-- Pie Chart: Waktu Transaksi -->
                <div class="bg-white p-6 border border-slate-200 rounded-lg shadow-sm">
                    <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 h-4 text-purple-500"></i> Jam Sibuk Transaksi
                    </h3>
                    <div class="relative h-64 w-full flex justify-center">
                        <canvas id="timePieChart"></canvas>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script src="profil.js"></script>

    <div id="logoutConfirmModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                    <i data-lucide="log-out" class="w-6 h-6 text-red-600"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-900">Logout?</h2>
            </div>
            <p class="text-slate-600 mb-6">Apakah Anda yakin ingin keluar dari aplikasi?</p>
            <div class="flex gap-3">
                <button onclick="cancelLogout()" class="flex-1 px-4 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-900 font-semibold rounded-lg transition-colors">
                    Batal
                </button>
                <button onclick="handleLogout()" class="flex-1 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </button>
            </div>
        </div>
    </div>
</body>
</html>
